name: Setup Node.js and pnpm
description: 'Set up Node.js, pnpm, and install dependencies with caching'

inputs:
  ignore-scripts:
    description: 'Pass --ignore-scripts to pnpm install. Use "true" for hardened jobs (e.g. publish).'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      name: Install pnpm

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: .nvmrc
        registry-url: 'https://registry.npmjs.org'
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install ${{ inputs.ignore-scripts == 'true' && '--ignore-scripts' || '' }}
