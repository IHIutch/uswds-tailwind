name: Setup Node.js and pnpm
description: 'Set up Node.js, pnpm, and install dependencies with caching'

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
      name: Install pnpm

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
        registry-url: 'https://registry.npmjs.org'
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install
