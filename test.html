<div data-part="combobox-root">
  <label data-part="combobox-label">Select a fruit:</label>
  <div>
    <div>
      <input data-part="combobox-input">
      <button
        data-part="combobox-toggle"
        type="button"
      >
        <div class="icon-[material-symbols--expand-more] size-8"></div>
      </button>
    </div>
    <ul data-part="combobox-list">
      <li
        data-part="combobox-item"
        data-value="apple"
      >Apple</li>
      <li
        data-part="combobox-item"
        data-value="banana"
      >Banana</li>
      <li
        data-part="combobox-item"
        data-value="cherry"
      >Cherry</li>
    </ul>
  </div>
</div>


<combobox>
  <combobox-label>Select a fruit:</combobox-label>
  <combobox-input></combobox-input>
  <combobox-toggle type="button">
    <div>▼</div>
  </combobox-toggle>
  <combobox-list>
    <combobox-item value="apple">Apple</combobox-item>
    <combobox-item value="banana">Banana</combobox-item>
    <combobox-item value="cherry">Cherry</combobox-item>
  </combobox-list>
</combobox>
